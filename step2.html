<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等しい弧に対する円周角</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html" class="home-btn">🏠</a>

<div class="view-switcher">
    <button id="switchAuto" class="active">🔄 自動</button>
    <button id="switchMobile">📱 スマホ版</button>
    <button id="switchPc">💻 PC版</button>
</div>

<h2>等しい弧に対する円周角</h2>

<div class="controls">
    弧AB = 弧CD
    <input type="range" id="arcInput" min="20" max="170" value="80">
    <br>
    <button id="overlapBtn">左右の図形を1つにまとめる</button>
    <button id="resetBtn">初期位置に戻す</button>
</div>

<canvas id="canvas" width="900" height="750"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const r = 130;      
const cx1 = 230;    
const cx2 = 670;    
const cy = 180;     

const cx3 = 450;    
const cy3 = 540;    

const DEFAULT_ARC_ANGLE = 80;
const DEFAULT_P_ANGLE = 200; 
const DEFAULT_C_START = 120;
const DEFAULT_Q_ANGLE = 320; 

let arcAngle = DEFAULT_ARC_ANGLE; 
let pAngle = DEFAULT_P_ANGLE;      
let startC = DEFAULT_C_START;    
let qAngle = DEFAULT_Q_ANGLE;     

let isOverlapped = false; 
let dragging = null;              
let dragOffsetC = 0; 

const arcInput = document.getElementById("arcInput");
const overlapBtn = document.getElementById("overlapBtn");
const resetBtn = document.getElementById("resetBtn");

arcInput.addEventListener("input", (e) => {
    arcAngle = parseInt(e.target.value);
    
    if (isAngleInArc(pAngle, 0, arcAngle)) {
        pAngle = arcAngle + 5;
    }
    
    if (isAngleInArc(qAngle, startC, arcAngle)) {
        qAngle = normalizeAngle(startC + arcAngle + 5);
    }
    
    draw();
});

overlapBtn.addEventListener("click", () => {
    isOverlapped = !isOverlapped;
    if (isOverlapped) {
        overlapBtn.textContent = "図形を元に戻す";
        overlapBtn.classList.add("active");
    } else {
        overlapBtn.textContent = "左右の図形を1つにまとめる";
        overlapBtn.classList.remove("active");
    }
    draw();
});

resetBtn.addEventListener("click", () => {
    isOverlapped = false;
    overlapBtn.textContent = "左右の図形を1つにまとめる";
    overlapBtn.classList.remove("active");
    
    arcAngle = DEFAULT_ARC_ANGLE;
    pAngle = DEFAULT_P_ANGLE;
    startC = DEFAULT_C_START;
    qAngle = DEFAULT_Q_ANGLE;
    
    arcInput.value = DEFAULT_ARC_ANGLE;
    
    draw();
});

function getPointOnCircle(cx, cy, angleDeg) {
    const rad = angleDeg * Math.PI / 180;
    return {
        x: cx + r * Math.cos(rad),
        y: cy - r * Math.sin(rad)
    };
}

function drawCircleBase(cx, cy, title, currentCx) {
    ctx.beginPath();
    ctx.arc(currentCx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "#cbd5e1";
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fill();

    ctx.font = "bold 16px sans-serif";
    ctx.fillStyle = "#64748b";
    ctx.fillText(title, currentCx - r + 15, cy - r + 25);
}

function drawDoubleCircle(x, y, color) {
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
}

function drawArcParts(currentCx, cy, startAngle, color, labelStart, labelEnd, showDoubleCircleC = false) {
    const radStart = startAngle * Math.PI / 180;
    const radEnd = (startAngle + arcAngle) * Math.PI / 180;
    
    ctx.beginPath();
    ctx.arc(currentCx, cy, r, -radStart, -radEnd, true);
    ctx.strokeStyle = color;
    ctx.lineWidth = 5;
    ctx.stroke();

    const pStart = getPointOnCircle(currentCx, cy, startAngle);
    const pEnd = getPointOnCircle(currentCx, cy, startAngle + arcAngle);
    
    ctx.font = "bold 16px sans-serif";
    ctx.fillStyle = "#334155";
    
    let offsetStart = { x: 13, y: 5 };
    let offsetEnd = { x: 13, y: 5 };
    
    if (Math.cos(radStart) < 0) offsetStart.x = -25;
    if (Math.sin(radStart) < 0) offsetStart.y = 18;
    if (Math.cos(radEnd) < 0) offsetStart.x = -25; 
    if (Math.sin(radEnd) < 0) offsetEnd.y = 18;
    
    ctx.fillText(labelStart, pStart.x + offsetStart.x, pStart.y + offsetStart.y);
    ctx.fillText(labelEnd, pEnd.x + offsetEnd.x, pEnd.y + offsetEnd.y);

    if (showDoubleCircleC) {
        drawDoubleCircle(pStart.x, pStart.y, "#334155");
    }
}

function drawAngleLines(currentCx, cy, pX, pY, startAngle, color, labelP, labelAngleText, isDraggable = true) {
    const pStart = getPointOnCircle(currentCx, cy, startAngle);
    const pEnd = getPointOnCircle(currentCx, cy, startAngle + arcAngle);
    
    ctx.beginPath();
    ctx.moveTo(pStart.x, pStart.y);
    ctx.lineTo(pX, pY);
    ctx.lineTo(pEnd.x, pEnd.y);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    if (isDraggable) {
        drawDoubleCircle(pX, pY, color);
    } else {
        ctx.beginPath();
        ctx.arc(pX, pY, 6, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }
    
    ctx.font = "bold 16px sans-serif";
    ctx.fillStyle = "#1e293b";
    ctx.fillText(labelP, pX - 5, pY - 18);
    
    ctx.font = "bold 15px sans-serif";
    ctx.fillStyle = color;
    ctx.fillText(labelAngleText, pX - 25, pY + 25);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // --- 1. 円1 (左側: 弧AB) の描画 ---
    drawCircleBase(cx1, cy, "円 (1)", cx1);
    drawArcParts(cx1, cy, 0, "#eab308", "B", "A", false);
    
    const pPt = getPointOnCircle(cx1, cy, pAngle);
    const inscribedP = arcAngle / 2;
    drawAngleLines(cx1, cy, pPt.x, pPt.y, 0, "#e11d48", "P", `∠APB=${inscribedP.toFixed(1)}°`, true);
    
    // --- 2. 円2 (右側: 弧CD) の描画 ---
    drawCircleBase(cx2, cy, "円 (2)", cx2);
    drawArcParts(cx2, cy, startC, "#eab308", "D", "C", true); 
    
    const qPt = getPointOnCircle(cx2, cy, qAngle);
    const inscribedQ = arcAngle / 2;
    drawAngleLines(cx2, cy, qPt.x, qPt.y, startC, "#16a34a", "Q", `∠CQD=${inscribedQ.toFixed(1)}°`, true);
    
    // --- 3. 下段：重ね合わせた図形の描画 ---
    if (isOverlapped) {
        drawCircleBase(cx3, cy3, "重ね合わせた図形", cx3);
        
        drawArcParts(cx3, cy3, 0, "rgba(234, 179, 8, 0.5)", "B", "A", false);
        drawArcParts(cx3, cy3, startC, "rgba(234, 179, 8, 0.5)", "D", "C", false);
        
        const pPt3 = getPointOnCircle(cx3, cy3, pAngle);
        drawAngleLines(cx3, cy3, pPt3.x, pPt3.y, 0, "#e11d48", "P", `∠APB=${inscribedP.toFixed(1)}°`, true);
        
        const qPt3 = getPointOnCircle(cx3, cy3, qAngle);
        drawAngleLines(cx3, cy3, qPt3.x, qPt3.y, startC, "#16a34a", "Q", `∠CQD=${inscribedQ.toFixed(1)}°`, true);
    }
}

function normalizeAngle(angle) {
    while (angle < 0) angle += 360;
    while (angle >= 360) angle -= 360;
    return angle;
}

function isAngleInArc(angle, start, duration) {
    let normAngle = normalizeAngle(angle - start);
    return normAngle >= 0 && normAngle <= duration;
}

function getHoveredPoint(x, y) {
    if (isOverlapped && y > cy3 - r - 50) {
        const pPt3 = getPointOnCircle(cx3, cy3, pAngle);
        if (Math.hypot(x - pPt3.x, y - pPt3.y) < 15) return "P";
        
        const qPt3 = getPointOnCircle(cx3, cy3, qAngle);
        if (Math.hypot(x - qPt3.x, y - qPt3.y) < 15) return "Q";

        const cPt3 = getPointOnCircle(cx3, cy3, startC);
        if (Math.hypot(x - cPt3.x, y - cPt3.y) < 15) return "C";
    } else {
        const pPt = getPointOnCircle(cx1, cy, pAngle);
        if (Math.hypot(x - pPt.x, y - pPt.y) < 15) return "P";
        
        const qPt = getPointOnCircle(cx2, cy, qAngle);
        if (Math.hypot(x - qPt.x, y - qPt.y) < 15) return "Q";
        
        const cPt = getPointOnCircle(cx2, cy, startC);
        if (Math.hypot(x - cPt.x, y - cPt.y) < 15) return "C";
    }
    return null;
}

canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    dragging = getHoveredPoint(x, y);

    if(dragging) {
        canvas.style.cursor = "grabbing"; 
        if(dragging === "C") {
            dragOffsetC = normalizeAngle(qAngle - startC);
        }
    }
});

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (dragging || getHoveredPoint(x, y)) {
        canvas.style.cursor = dragging ? "grabbing" : "pointer";
    } else {
        canvas.style.cursor = "default";
    }

    if(!dragging) return;

    let angle;

    if(dragging === "P"){
        if (isOverlapped && y > cy3 - r - 50) {
            angle = Math.atan2(cy3 - y, x - cx3) * 180 / Math.PI;
        } else {
            angle = Math.atan2(cy - y, x - cx1) * 180 / Math.PI;
        }
        angle = normalizeAngle(angle);
        
        if (isAngleInArc(angle, 0, arcAngle)) {
            pAngle = (angle < arcAngle / 2) ? arcAngle : 0;
        } else {
            pAngle = angle;
        }
    }

    if(dragging === "C"){
        if (isOverlapped && y > cy3 - r - 50) {
            angle = Math.atan2(cy3 - y, x - cx3) * 180 / Math.PI;
        } else {
            angle = Math.atan2(cy - y, x - cx2) * 180 / Math.PI;
        }
        startC = normalizeAngle(angle); 
        
        qAngle = normalizeAngle(startC + dragOffsetC);
        
        if (isAngleInArc(qAngle, startC, arcAngle)) {
            let diff = normalizeAngle(qAngle - startC);
            let snapAngle = (diff < arcAngle / 2) ? arcAngle : 0;
            qAngle = normalizeAngle(startC + snapAngle);
            dragOffsetC = normalizeAngle(qAngle - startC);
        }
    }

    if(dragging === "Q"){
        if (isOverlapped && y > cy3 - r - 50) {
            angle = Math.atan2(cy3 - y, x - cx3) * 180 / Math.PI;
        } else {
            angle = Math.atan2(cy - y, x - cx2) * 180 / Math.PI;
        }
        angle = normalizeAngle(angle);
        if (isAngleInArc(angle, startC, arcAngle)) {
            let diff = normalizeAngle(angle - startC);
            let snapAngle = (diff < arcAngle / 2) ? arcAngle : 0;
            qAngle = normalizeAngle(startC + snapAngle);
        } else {
            qAngle = angle;
        }
    }

    draw();
});

window.addEventListener("mouseup", () => {
    dragging = null;
    canvas.style.cursor = "default";
});

draw();

document.addEventListener("DOMContentLoaded", () => {
    const btnAuto = document.getElementById("switchAuto");
    const btnMobile = document.getElementById("switchMobile");
    const btnPc = document.getElementById("switchPc");
    const body = document.body;

    function removeClasses() {
        body.classList.remove("forced-mobile", "forced-pc");
        btnAuto.classList.remove("active");
        btnMobile.classList.remove("active");
        btnPc.classList.remove("active");
    }

    btnAuto.addEventListener("click", () => { removeClasses(); btnAuto.classList.add("active"); });
    btnMobile.addEventListener("click", () => { removeClasses(); body.classList.add("forced-mobile"); btnMobile.classList.add("active"); });
    btnPc.addEventListener("click", () => { removeClasses(); body.classList.add("forced-pc"); btnPc.classList.add("active"); });
});
</script>
</body>
</html>
