<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等しい弧に対する円周角</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="custom-header">
    <a href="index.html" class="enhanced-home-btn">🏠 ホーム</a>
    <button id="toggleViewBtn" class="toggle-view-btn">
        <span id="toggleViewIcon">📱</span> <span id="toggleViewText">スマホ版に切り替える</span>
    </button>
</header>

<h2>等しい弧に対する円周角</h2>

<div class="container">
    <div class="canvas-area">
        <div class="controls">
            弧の長さ調整: <input type="range" id="arcInput" min="20" max="150" value="70">
            <span id="arcValue">70°</span>
            <div class="nav-tooltip-wrapper">
                <button id="overlapBtn">
                    <span class="btn-text-normal">2つの図形を1つにまとめる</span>
                    <span class="btn-text-icon">🧬</span>
                </button>
                <span class="tooltip-text">左右の図を重ねて比較する</span>
            </div>
            <div class="nav-tooltip-wrapper">
                <button id="resetBtn">
                    <span class="btn-text-normal">位置リセット</span>
                    <span class="btn-text-icon">🔄</span>
                </button>
                <span class="tooltip-text">図形の位置を初期状態に戻す</span>
            </div>
        </div>
        <canvas id="canvas" width="850" height="500"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let cx1 = 230, cy1 = 250, cx2 = 620, cy2 = 250;
const r = 160;
let arcAngle = 70;
let isOverlapped = false;

let pAngle = 90;  // 左円の円周角頂点
let qAngle = 270; // 右円の円周角頂点

function drawCircleData(cx, cy, startArc, endArc, pAng, color, label1, label2, pLabel) {
    // 円
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 1.5; ctx.stroke();
    // 弧
    ctx.beginPath(); ctx.arc(cx, cy, r, -endArc*Math.PI/180, -startArc*Math.PI/180, false); ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.stroke();
    
    const A = { x: cx + r*Math.cos(startArc*Math.PI/180), y: cy - r*Math.sin(startArc*Math.PI/180) };
    const B = { x: cx + r*Math.cos(endArc*Math.PI/180), y: cy - r*Math.sin(endArc*Math.PI/180) };
    const P = { x: cx + r*Math.cos(pAng*Math.PI/180), y: cy - r*Math.sin(pAng*Math.PI/180) };

    // 円周角の線
    ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(P.x, P.y); ctx.lineTo(B.x, B.y); ctx.strokeStyle = "#475569"; ctx.lineWidth = 2; ctx.stroke();

    // 点
    ctx.fillStyle = "#334155"; ctx.beginPath(); ctx.arc(A.x, A.y, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(B.x, B.y, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(P.x, P.y, 7, 0, Math.PI*2); ctx.fill();

    ctx.font = "bold 14px sans-serif"; ctx.fillStyle = "#1e293b";
    ctx.fillText(label1, A.x + 8, A.y + 5); ctx.fillText(label2, B.x - 15, B.y - 8);
    ctx.fillText(`${pLabel} (${(arcAngle/2).toFixed(1)}°)`, P.x - 15, P.y - 12);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (isOverlapped) {
        drawCircleData(425, cy1, 0, arcAngle, pAngle, "#3b82f6", "A", "B", "P");
        drawCircleData(425, cy1, 180, 180 + arcAngle, qAngle, "#ef4444", "C", "D", "Q");
    } else {
        drawCircleData(cx1, cy1, 0, arcAngle, pAngle, "#3b82f6", "A", "B", "P");
        drawCircleData(cx2, cy2, 40, 40 + arcAngle, qAngle, "#ef4444", "C", "D", "Q");
    }
}

document.getElementById("arcInput").addEventListener("input", (e) => {
    arcAngle = parseInt(e.target.value);
    document.getElementById("arcValue").textContent = arcAngle + "°";
    draw();
});

document.getElementById("overlapBtn").addEventListener("click", () => {
    isOverlapped = !isOverlapped;
    document.getElementById("overlapBtn").querySelector(".btn-text-normal").textContent = isOverlapped ? "元に戻す" : "2つの図形を1つにまとめる";
    draw();
});

document.getElementById("resetBtn").addEventListener("click", () => { pAngle = 90; qAngle = 270; draw(); });

let draggingP = false, draggingQ = false;
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const curCx1 = isOverlapped ? 425 : cx1;
    const curCx2 = isOverlapped ? 425 : cx2;

    const P = { x: curCx1 + r*Math.cos(pAngle*Math.PI/180), y: cy1 - r*Math.sin(pAngle*Math.PI/180) };
    const Q = { x: curCx2 + r*Math.cos(qAngle*Math.PI/180), y: cy2 - r*Math.sin(qAngle*Math.PI/180) };

    if (Math.hypot(x - P.x, y - P.y) < 20) draggingP = true;
    else if (Math.hypot(x - Q.x, y - Q.y) < 20) draggingQ = true;
});

canvas.addEventListener("mousemove", (e) => {
    if (!draggingP && !draggingQ) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const curCx = draggingP ? (isOverlapped ? 425 : cx1) : (isOverlapped ? 425 : cx2);
    let ang = Math.atan2(cy1 - y, x - curCx) * 180 / Math.PI;
    if (ang < 0) ang += 360;
    if (draggingP) pAngle = ang; else qAngle = ang;
    draw();
});

window.addEventListener("mouseup", () => { draggingP = false; draggingQ = false; });

document.addEventListener("DOMContentLoaded", () => {
    const toggleViewBtn = document.getElementById("toggleViewBtn");
    const toggleViewIcon = document.getElementById("toggleViewIcon");
    const toggleViewText = document.getElementById("toggleViewText");
    const body = document.body;
    if(localStorage.getItem("forcedMobile") === "true") { body.classList.add("forced-mobile"); toggleViewIcon.textContent = "💻"; toggleViewText.textContent = "PC版に切り替える"; }
    toggleViewBtn.addEventListener("click", () => {
        if (body.classList.contains("forced-mobile")) { body.classList.remove("forced-mobile"); localStorage.setItem("forcedMobile", "false"); toggleViewIcon.textContent = "📱"; toggleViewText.textContent = "スマホ版に切り替える"; }
        else { body.classList.add("forced-mobile"); localStorage.setItem("forcedMobile", "true"); toggleViewIcon.textContent = "💻"; toggleViewText.textContent = "PC版に切り替える"; }
    });
    draw();
});
</script>
</body>
</html>
