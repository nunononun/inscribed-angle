<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直径に対する円周角</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="custom-header">
    <a href="index.html" class="enhanced-home-btn">🏠 ホーム</a>
    <button id="toggleViewBtn" class="toggle-view-btn">
        <span id="toggleViewIcon">📱</span> <span id="toggleViewText">スマホ版に切り替える</span>
    </button>
</header>

<h2>直径に対する円周角の確かめ</h2>
<p style="max-width:600px; margin:0 auto 15px auto; font-size:0.95rem; color:#475569;">
    青い線は円の<strong>直径（中心角 180°）</strong>です。赤い点 <strong>P</strong> をドラッグしてみましょう。どこへ動かしても円周角は<strong>常に 90°（直角）</strong>になります。
</p>

<div class="container">
    <div class="canvas-area">
        <div class="controls">
            <span style="font-weight:bold; color:#ef4444;">∠APB (円周角) = 90° (常に一定)</span>
        </div>
        <canvas id="canvas" width="700" height="550"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const cx = 350, cy = 275, r = 200;
let pAngle = 70;
let dragging = false;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 円
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 2; ctx.stroke();

    const A = { x: cx + r, y: cy }, B = { x: cx - r, y: cy };
    const P = { x: cx + r*Math.cos(pAngle*Math.PI/180), y: cy - r*Math.sin(pAngle*Math.PI/180) };

    // 直径
    ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 4; ctx.stroke();

    // 円周角
    ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(P.x, P.y); ctx.lineTo(B.x, B.y); ctx.strokeStyle = "#475569"; ctx.lineWidth = 2; ctx.stroke();

    // 直角マーク
    const dAP = { x: A.x - P.x, y: A.y - P.y }, dBP = { x: B.x - P.x, y: B.y - P.y };
    const lenAP = Math.hypot(dAP.x, dAP.y), lenBP = Math.hypot(dBP.x, dBP.y);
    const uAP = { x: dAP.x / lenAP, y: dAP.y / lenAP }, uBP = { x: dBP.x / lenBP, y: dBP.y / lenBP };
    const size = 15;
    const cl1 = { x: P.x + uAP.x * size, y: P.y + uAP.y * size }, cl2 = { x: P.x + uBP.x * size, y: P.y + uBP.y * size }, cl3 = { x: cl1.x + uBP.x * size, y: cl1.y + uBP.y * size };
    ctx.beginPath(); ctx.moveTo(cl1.x, cl1.y); ctx.lineTo(cl3.x, cl3.y); ctx.lineTo(cl2.x, cl2.y); ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 2; ctx.stroke();

    // 点 P
    ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(P.x, P.y, 8, 0, Math.PI*2); ctx.fill();

    ctx.font = "bold 15px sans-serif"; ctx.fillStyle = "#1e293b";
    ctx.fillText("A", A.x + 12, A.y + 5); ctx.fillText("B", B.x - 20, B.y + 5);
    ctx.fillText("P (90°)", P.x - 15, P.y - 15);
}

canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    if(Math.hypot(x - (cx + r*Math.cos(pAngle*Math.PI/180)), y - (cy - r*Math.sin(pAngle*Math.PI/180))) < 20) dragging = true;
});

canvas.addEventListener("mousemove", (e) => {
    if(!dragging) return;
    const rect = canvas.getBoundingClientRect();
    let ang = Math.atan2(cy - (e.clientY - rect.top), (e.clientX - rect.left) - cx) * 180 / Math.PI;
    if(ang < 0) ang += 360;
    if(Math.abs(ang - 0) > 3 && Math.abs(ang - 180) > 3) pAngle = ang;
    draw();
});
window.addEventListener("mouseup", () => dragging = false);

document.addEventListener("DOMContentLoaded", () => {
    const toggleViewBtn = document.getElementById("toggleViewBtn");
    const toggleViewIcon = document.getElementById("toggleViewIcon");
    const toggleViewText = document.getElementById("toggleViewText");
    const body = document.body;
    if(localStorage.getItem("forcedMobile") === "true") { body.classList.add("forced-mobile"); toggleViewIcon.textContent = "💻"; toggleViewText.textContent = "PC版に切り替える"; }
    toggleViewBtn.addEventListener("click", () => {
        if (body.classList.contains("forced-mobile")) { body.classList.remove("forced-mobile"); localStorage.setItem("forcedMobile", "false"); toggleViewIcon.textContent = "📱"; toggleViewText.textContent = "スマホ版に切り替える"; }
        else { body.classList.add("forced-mobile"); localStorage.setItem("forcedMobile", "true"); toggleViewIcon.textContent = "💻"; toggleViewText.textContent = "PC版に切り替える"; }
    });
    draw();
});
</script>
</body>
</html>
