<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>円周角の定理（直径と直角の確かめ - 点Pのみ）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<a href="index.html" class="home-btn">🏠</a>

<div class="view-switcher">
    <button id="switchAuto" class="active">🔄 自動</button>
    <button id="switchMobile">📱 スマホ版</button>
    <button id="switchPc">💻 PC版</button>
</div>

<h2>直径に対する円周角の確かめ</h2>
<p class="description">
    青い線は円の<strong>直径（中心角 180°）</strong>です。<br>
    円周上の赤い点 <strong>P</strong> をマウスや指で好きな場所にドラッグしてみましょう。<br>
    どこへ動かしても、円周角が<strong>常に 90°（直角）</strong>になることを確かめられます。
</p>

<div class="controls">
    <span id="pAngleDisplay" class="angle-display">∠APB (円周角): --°</span>
</div>

<canvas id="canvas" width="700" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const cx = 350, cy = 300, r = 220;

// 直径にするため、Aは0度(右端)、Bは180度(左端)で固定
const angleA = 0;
const angleB = 180;

let pAngle = 70; // 初期位置
let draggingP = false;

const pAngleDisplay = document.getElementById("pAngleDisplay");

function pointOnCircle(angleDeg) {
    const rad = angleDeg * Math.PI / 180;
    return {
        x: cx + r * Math.cos(rad),
        y: cy - r * Math.sin(rad)
    };
}

function drawDoubleCircle(x, y, color) {
    // 外側の円
    ctx.beginPath();
    ctx.arc(x, y, 13, 0, 2 * Math.PI);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 内側の塗りつぶし円
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, 2 * Math.PI);
    ctx.fillStyle = color;
    ctx.fill();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const isPUpper = (pAngle > 0 && pAngle < 180);

    // --- 1. 中心角180°を表す扇形の描画 ---
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    if (isPUpper) {
        // Pが上半分にいるときは、下半分（180°〜360°）を塗りつぶし
        ctx.arc(cx, cy, r, -Math.PI, 0, false);
    } else {
        // Pが下半分にいるときは、上半分（0°〜180°）を塗りつぶし
        ctx.arc(cx, cy, r, 0, -Math.PI, false);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(37, 99, 235, 0.15)"; // 存在感を出すため少し濃く変更
    ctx.fill();
    ctx.restore();

    // ベースの円
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = "#cbd5e1";
    ctx.lineWidth = 3;
    ctx.stroke();

    // 直径 AB (青い線) の描画
    const A = pointOnCircle(angleA);
    const B = pointOnCircle(angleB);
    const P = pointOnCircle(pAngle);

    ctx.beginPath();
    ctx.moveTo(A.x, A.y);
    ctx.lineTo(B.x, B.y);
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 4;
    ctx.stroke();

    // --- 2. 【追加】中心角 180° を目立たせる中心付近のガイド弓矢矢印とテキスト ---
    ctx.save();
    const arrowRadius = 35; // 中心Oの周りに描く矢印の半径
    ctx.beginPath();
    if (isPUpper) {
        // 下側に180°の円弧を描画
        ctx.arc(cx, cy, arrowRadius, 0, Math.PI, false);
    } else {
        // 上側に180°の円弧を描画
        ctx.arc(cx, cy, arrowRadius, Math.PI, 0, false);
    }
    ctx.strokeStyle = "#1d4ed8";
    ctx.lineWidth = 3;
    ctx.stroke();

    // 中心角 180° の文字を配置
    ctx.font = "bold 15px sans-serif";
    ctx.fillStyle = "#1d4ed8";
    ctx.textAlign = "center";
    if (isPUpper) {
        ctx.fillText("中心角 180°", cx, cy + arrowRadius + 20);
    } else {
        ctx.fillText("中心角 180°", cx, cy - arrowRadius - 10);
    }
    ctx.restore();

    // 中心点 O の描画（中心角の矢印の上に重ねる）
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
    ctx.fillStyle = "#475569";
    ctx.fill();
    ctx.font = "bold 16px sans-serif";
    ctx.fillStyle = "#475569";
    ctx.textAlign = "left";
    ctx.fillText("O", cx - 20, cy + 5);

    // 点ラベルの描画
    ctx.fillStyle = "#0f172a";
    ctx.fillText("A", A.x + 15, A.y + 5);
    ctx.fillText("B", B.x - 25, B.y + 5);
    ctx.fillText("P", P.x - 5, P.y - 20);

    // 円周角の軌跡・三角形 APB (赤い線)
    ctx.beginPath();
    ctx.moveTo(A.x, A.y);
    ctx.lineTo(P.x, P.y);
    ctx.lineTo(B.x, B.y);
    ctx.strokeStyle = "rgba(220, 38, 38, 0.85)";
    ctx.lineWidth = 3;
    ctx.stroke();

    // 可動点 P のデザイン（二重丸）
    drawDoubleCircle(P.x, P.y, "#dc2626");

    // ★ 直角マーク
    const dxA = A.x - P.x, dyA = A.y - P.y;
    const dxB = B.x - P.x, dyB = B.y - P.y;
    const lenA = Math.hypot(dxA, dyA);
    const lenB = Math.hypot(dxB, dyB);
    
    const size = 18;
    const uxA = (dxA / lenA) * size;
    const uyA = (dyA / lenA) * size;
    const uxB = (dxB / lenB) * size;
    const uyB = (dyB / lenB) * size;

    ctx.beginPath();
    ctx.moveTo(P.x + uxA, P.y + uyA);
    ctx.lineTo(P.x + uxA + uxB, P.y + uyA + uyB);
    ctx.lineTo(P.x + uxB, P.y + uyB);
    ctx.strokeStyle = "deeppink"; 
    ctx.lineWidth = 2;
    ctx.stroke();

    const inscribedP = 90.0; 

    // キャンバス内への角度数値テキスト表示
    ctx.font = "bold 16px sans-serif";
    ctx.fillStyle = "red";
    ctx.fillText(inscribedP.toFixed(1) + "° (直角)", P.x + 15, P.y + 25);
    
    // 上部パーツのテキスト更新
    pAngleDisplay.textContent = `∠APB (円周角): ${inscribedP.toFixed(1)}°`;
}

// マウスイベント処理
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const P = pointOnCircle(pAngle);

    if (Math.hypot(x - P.x, y - P.y) < 25) {
        draggingP = true;
        canvas.style.cursor = "grabbing";
    }
    draw();
});

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const P = pointOnCircle(pAngle);
    if (Math.hypot(x - P.x, y - P.y) < 25 || draggingP) {
        canvas.style.cursor = draggingP ? "grabbing" : "pointer";
    } else {
        canvas.style.cursor = "default";
    }

    if (!draggingP) return;

    let angle = Math.atan2(cy - y, x - cx) * 180 / Math.PI;
    if (angle < 0) angle += 360;

    if (angle > 1 && angle < 179) {
        pAngle = angle;
    } else if (angle > 181 && angle < 359) {
        pAngle = angle;
    }

    draw();
});

window.addEventListener("mouseup", () => {
    draggingP = false;
    canvas.style.cursor = "default";
});

// 初期描画
draw();

// ⚙️ 画面サイズ切り替えスクリプト
document.addEventListener("DOMContentLoaded", () => {
    const btnAuto = document.getElementById("switchAuto");
    const btnMobile = document.getElementById("switchMobile");
    const btnPc = document.getElementById("switchPc");
    const body = document.body;

    function removeClasses() {
        body.classList.remove("forced-mobile", "forced-pc");
        btnAuto.classList.remove("active");
        btnMobile.classList.remove("active");
        btnPc.classList.remove("active");
    }

    btnAuto.addEventListener("click", () => { removeClasses(); btnAuto.classList.add("active"); });
    btnMobile.addEventListener("click", () => { removeClasses(); body.classList.add("forced-mobile"); btnMobile.classList.add("active"); });
    btnPc.addEventListener("click", () => { removeClasses(); body.classList.add("forced-pc"); btnPc.classList.add("active"); });
});
</script>
</body>
</html>
