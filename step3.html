<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弧の長さと円周角の比例</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="custom-header">
    <a href="index.html" class="enhanced-home-btn">🏠 ホーム</a>
    <button id="toggleViewBtn" class="toggle-view-btn">
        <span id="toggleViewIcon">📱</span> <span id="toggleViewText">スマホ版に切り替える</span>
    </button>
</header>

<h2>弧の長さと円周角の比例</h2>

<div class="container">
    <div class="canvas-area">
        <div class="controls">
            基準の弧の長さ(倍率用): <input type="range" id="baseArc" min="20" max="60" value="40">
            <span id="baseValue">40°</span>
        </div>
        <canvas id="canvas" width="800" height="550"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const cx = 400, cy = 280, r = 180;
let baseAngle = 40;

let p1Angle = 110, p2Angle = 210;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 円
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 2; ctx.stroke();

    // 弧1 (倍率1)
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, -baseAngle*Math.PI/180, true); ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 5; ctx.stroke();

    // 弧2 (倍率2)
    ctx.beginPath(); ctx.arc(cx, cy, r, -100*Math.PI/180, -(100 + baseAngle*2)*Math.PI/180, true); ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 5; ctx.stroke();

    // 各頂点構造
    const A = { x: cx + r, y: cy }, B = { x: cx + r*Math.cos(baseAngle*Math.PI/180), y: cy - r*Math.sin(baseAngle*Math.PI/180) };
    const C = { x: cx + r*Math.cos(100*Math.PI/180), y: cy - r*Math.sin(100*Math.PI/180) }, D = { x: cx + r*Math.cos((100+baseAngle*2)*Math.PI/180), y: cy - r*Math.sin((100+baseAngle*2)*Math.PI/180) };
    
    const P1 = { x: cx + r*Math.cos(p1Angle*Math.PI/180), y: cy - r*Math.sin(p1Angle*Math.PI/180) };
    const P2 = { x: cx + r*Math.cos(p2Angle*Math.PI/180), y: cy - r*Math.sin(p2Angle*Math.PI/180) };

    // 線1
    ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(P1.x, P1.y); ctx.lineTo(B.x, B.y); ctx.strokeStyle = "#64748b"; ctx.stroke();
    // 線2
    ctx.beginPath(); ctx.moveTo(C.x, C.y); ctx.lineTo(P2.x, P2.y); ctx.lineTo(D.x, D.y); ctx.strokeStyle = "#64748b"; ctx.stroke();

    // 点描画
    ctx.fillStyle = "#3b82f6"; ctx.beginPath(); ctx.arc(P1.x, P1.y, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(P2.x, P2.y, 7, 0, Math.PI*2); ctx.fill();

    ctx.font = "bold 14px sans-serif"; ctx.fillStyle = "#1e293b";
    ctx.fillText(`弧の長さ: 1倍 ➔ 円周角: ${(baseAngle/2).toFixed(1)}°`, P1.x - 40, P1.y - 12);
    ctx.fillText(`弧の長さ: 2倍 ➔ 円周角: ${(baseAngle).toFixed(1)}°`, P2.x - 40, P2.y - 12);
    ctx.fillText("A", A.x+10, A.y); ctx.fillText("B", B.x+5, B.y-5);
    ctx.fillText("C", C.x-15, C.y-5); ctx.fillText("D", D.x-15, D.y+15);
}

document.getElementById("baseArc").addEventListener("input", (e) => {
    baseAngle = parseInt(e.target.value);
    document.getElementById("baseValue").textContent = baseAngle + "°";
    draw();
});

let dragTarget = null;
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    if(Math.hypot(x - (cx + r*Math.cos(p1Angle*Math.PI/180)), y - (cy - r*Math.sin(p1Angle*Math.PI/180))) < 20) dragTarget = 1;
    if(Math.hypot(x - (cx + r*Math.cos(p2Angle*Math.PI/180)), y - (cy - r*Math.sin(p2Angle*Math.PI/180))) < 20) dragTarget = 2;
});

canvas.addEventListener("mousemove", (e) => {
    if(!dragTarget) return;
    const rect = canvas.getBoundingClientRect();
    let ang = Math.atan2(cy - (e.clientY - rect.top), (e.clientX - rect.left) - cx) * 180 / Math.PI;
    if(ang < 0) ang += 360;
    if(dragTarget === 1) p1Angle = ang; else p2Angle = ang;
    draw();
});
window.addEventListener("mouseup", () => dragTarget = null);

document.addEventListener("DOMContentLoaded", () => {
    const toggleViewBtn = document.getElementById("toggleViewBtn");
    const toggleViewIcon = document.getElementById("toggleViewIcon");
    const toggleViewText = document.getElementById("toggleViewText");
    const body = document.body;
    if(localStorage.getItem("forcedMobile") === "true") { body.classList.add("forced-mobile"); toggleViewIcon.textContent = "💻"; toggleViewText.textContent = "PC版に切り替える"; }
    toggleViewBtn.addEventListener("click", () => {
        if (body.classList.contains("forced-mobile")) { body.classList.remove("forced-mobile"); localStorage.setItem("forcedMobile", "false"); toggleViewIcon.textContent = "📱"; toggleViewText.textContent = "スマホ版に切り替える"; }
        else { body.classList.add("forced-mobile"); localStorage.setItem("forcedMobile", "true"); toggleViewIcon.textContent = "💻"; toggleViewText.textContent = "PC版に切り替える"; }
    });
    draw();
});
</script>
</body>
</html>
