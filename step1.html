<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>円周角の定理 教材</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<a href="index.html" class="home-btn">🏠</a>

<div class="view-switcher">
    <button id="switchAuto" class="active">🔄 自動</button>
    <button id="switchMobile">📱 スマホ版</button>
    <button id="switchPc">💻 PC版</button>
</div>

<h2>円周角の定理</h2>

<div class="container">
    <div class="canvas-area">
        <div class="controls">
            <label>中心角 ∠AOB(入力値) :
                <input type="number" id="angleInput" value="80" min="10" max="350">°
            </label>
            <button id="toggleP">Pを非表示</button>
            <button id="toggleQ">Qを表示</button>

            <span id="pAngleDisplay" class="angle-display">Pの中心角: --°</span>
            <span id="qAngleDisplay" class="angle-display">Qの中心角: --°</span>
        </div>

        <canvas id="canvas" width="700" height="600"></canvas>
    </div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const cx=350,cy=300,r=220;

let centerAngle=80;
let pAngle=220;
let qAngle=140;

let draggingP=false;
let draggingQ=false;
let showP=true;
let showQ=false;

const angleInput=document.getElementById("angleInput");
const togglePBtn=document.getElementById("toggleP");
const toggleQBtn=document.getElementById("toggleQ");
const pAngleDisplay=document.getElementById("pAngleDisplay");
const qAngleDisplay=document.getElementById("qAngleDisplay");

function pointOnCircle(deg){
    const rad=(deg*Math.PI)/180;
    return {
        x:cx+r*Math.cos(rad),
        y:cy-r*Math.sin(rad)
    };
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle="#cbd5e1";
    ctx.lineWidth=3;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.fillStyle="#1e293b";
    ctx.fill();
    ctx.font="16px Arial";
    ctx.fillText("O",cx-20,cy+5);

    const A = pointOnCircle(0);
    const B = pointOnCircle(centerAngle);

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(A.x,A.y);
    ctx.moveTo(cx,cy);
    ctx.lineTo(B.x,B.y);
    ctx.strokeStyle="#3b82f6";
    ctx.lineWidth=4;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(A.x,A.y,6,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
    ctx.fillText("A",A.x+10,A.y+5);

    ctx.beginPath();
    ctx.arc(B.x,B.y,6,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();
    ctx.fillText("B",B.x+10,B.y-10);

    ctx.font="bold 18px Arial";
    ctx.fillStyle="#1e293b";
    ctx.fillText(`中心角 ∠AOB = ${centerAngle}°`,40,50);

    let currentCenterAngleP = pAngle;
    if(currentCenterAngleP < 0) currentCenterAngleP += 360;
    let currentCenterAngleQ = qAngle;
    if(currentCenterAngleQ < 0) currentCenterAngleQ += 360;

    if(showP){
        const P = pointOnCircle(pAngle);
        ctx.beginPath();
        ctx.moveTo(A.x,A.y);
        ctx.lineTo(P.x,P.y);
        ctx.lineTo(B.x,B.y);
        ctx.strokeStyle="#ef4444";
        ctx.lineWidth=3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(P.x,P.y,8,0,Math.PI*2);
        ctx.fillStyle="#ef4444";
        ctx.fill();
        ctx.fillText("P",P.x-5,P.y-15);

        ctx.fillStyle="#ef4444";
        ctx.fillText(`円周角 ∠APB = ${(centerAngle/2).toFixed(1)}°`,40,90);
    }

    if(showQ){
        const Q = pointOnCircle(qAngle);
        ctx.beginPath();
        ctx.moveTo(A.x,A.y);
        ctx.lineTo(Q.x,Q.y);
        ctx.lineTo(B.x,B.y);
        ctx.strokeStyle="#10b981";
        ctx.lineWidth=3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(Q.x,Q.y,8,0,Math.PI*2);
        ctx.fillStyle="#10b981";
        ctx.fill();
        ctx.fillText("Q",Q.x-5,Q.y-15);

        ctx.fillStyle="#10b981";
        ctx.fillText(`円周角 ∠AQB = ${(centerAngle/2).toFixed(1)}°`,40,130);
    }

    if(showP) {
        pAngleDisplay.textContent = `Pの中心角: ${currentCenterAngleP.toFixed(1)}°`;
        pAngleDisplay.style.display = "inline";
    } else {
        pAngleDisplay.style.display = "none";
    }

    if(showQ) {
        qAngleDisplay.textContent = `Qの中心角: ${currentCenterAngleQ.toFixed(1)}°`;
        qAngleDisplay.style.display = "inline";
    } else {
        qAngleDisplay.style.display = "none";
    }
}

angleInput.addEventListener("input",(e)=>{
    let val = parseInt(e.target.value);
    if(isNaN(val)) return;
    if(val < 1) val = 1;
    if(val > 359) val = 359;
    centerAngle = val;
    draw();
});

togglePBtn.addEventListener("click",()=>{
    showP = !showP;
    togglePBtn.textContent = showP ? "Pを非表示" : "Pを表示";
    draw();
});

toggleQBtn.addEventListener("click",()=>{
    showQ = !showQ;
    toggleQBtn.textContent = showQ ? "Qを非表示" : "Qを表示";
    draw();
});

canvas.addEventListener("mousedown",(e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const P = pointOnCircle(pAngle);
    const Q = pointOnCircle(qAngle);

    if(showP && Math.hypot(x-P.x,y-P.y) < 15){
        draggingP = true;
    }
    if(showQ && Math.hypot(x-Q.x,y-Q.y) < 15){
        draggingQ = true;
    }
});

canvas.addEventListener("mousemove",(e)=>{
    if(!draggingP && !draggingQ) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let angle = Math.atan2(cy - y, x - cx) * 180 / Math.PI;
    if (angle < 0) angle += 360;

    if (draggingP) pAngle = angle;
    if (draggingQ) qAngle = angle;

    draw();
});

canvas.addEventListener("mouseup", () => { draggingP = false; draggingQ = false; });
canvas.addEventListener("mouseleave", () => { draggingP = false; draggingQ = false; });

draw();

document.addEventListener("DOMContentLoaded", () => {
    const btnAuto = document.getElementById("switchAuto");
    const btnMobile = document.getElementById("switchMobile");
    const btnPc = document.getElementById("switchPc");
    const body = document.body;

    function removeClasses() {
        body.classList.remove("forced-mobile", "forced-pc");
        btnAuto.classList.remove("active");
        btnMobile.classList.remove("active");
        btnPc.classList.remove("active");
    }

    btnAuto.addEventListener("click", () => { removeClasses(); btnAuto.classList.add("active"); });
    btnMobile.addEventListener("click", () => { removeClasses(); body.classList.add("forced-mobile"); btnMobile.classList.add("active"); });
    btnPc.addEventListener("click", () => { removeClasses(); body.classList.add("forced-pc"); btnPc.classList.add("active"); });
});
</script>
</body>
</html>
